version: '3.8'

# Development Docker Compose configuration
# Use: docker-compose -f docker-compose.dev.yml up

services:
  retailpulse-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retailpulse-dev
    ports:
      - "8501:8501"
    volumes:
      # Mount entire project for hot-reload during development
      - ./dashboard:/app/dashboard
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./.streamlit:/app/.streamlit
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
    restart: unless-stopped
    networks:
      - retailpulse-dev-network
    command: streamlit run dashboard/Home.py --server.port=8501 --server.address=0.0.0.0 --server.runOnSave=true

networks:
  retailpulse-dev-network:
    driver: bridge
